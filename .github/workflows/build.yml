name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.3.10f1-${{ matrix.imageTag }}-3
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: StandaloneOSX
            buildMethod: NexusArena.Editor.BuildManager.BuildMacOS
            imageTag: mac-mono
          - targetPlatform: StandaloneWindows64
            buildMethod: NexusArena.Editor.BuildManager.BuildWindows
            imageTag: windows-mono
          - targetPlatform: StandaloneLinux64
            buildMethod: NexusArena.Editor.BuildManager.BuildLinux
            imageTag: linux-il2cpp
          - targetPlatform: WebGL
            buildMethod: NexusArena.Editor.BuildManager.BuildWebGL
            imageTag: webgl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Activate Unity license
        run: |
          mkdir -p /root/.local/share/unity3d/Unity
          echo "$UNITY_LICENSE" | tr -d '\r' > /root/.local/share/unity3d/Unity/Unity_lic.ulf
          unity-editor \
            -batchmode -nographics -quit \
            -logFile - \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            2>&1 | tail -20 || true
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Build Unity project
        run: |
          unity-editor \
            -batchmode -nographics -quit \
            -logFile - \
            -projectPath . \
            -executeMethod ${{ matrix.buildMethod }} \
            -buildTarget ${{ matrix.targetPlatform }} \
            2>&1
        timeout-minutes: 60

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusArena-${{ matrix.targetPlatform }}
          path: Build
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            NexusArena-*.zip
